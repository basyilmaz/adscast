services:
  postgres:
    image: postgres:16-alpine
    container_name: adscast-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - adscast_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - adscast_net

  redis:
    image: redis:7-alpine
    container_name: adscast-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - adscast_redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - adscast_net

  backend:
    build:
      context: .
      dockerfile: infra/docker/backend/Dockerfile
    container_name: adscast-backend
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME}
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      APP_DEBUG: "false"
      APP_URL: ${APP_URL}
      APP_TIMEZONE: ${APP_TIMEZONE}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
      LOG_CHANNEL: stderr
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      CACHE_STORE: redis
      SESSION_DRIVER: database
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      META_APP_ID: ${META_APP_ID}
      META_APP_SECRET: ${META_APP_SECRET}
      META_REDIRECT_URI: ${META_REDIRECT_URI}
      META_API_VERSION: ${META_API_VERSION}
      META_WEBHOOK_VERIFY_TOKEN: ${META_WEBHOOK_VERIFY_TOKEN}
      AI_PROVIDER: ${AI_PROVIDER}
      AI_API_KEY: ${AI_API_KEY}
      AI_MODEL: ${AI_MODEL}
      AI_TEMPERATURE: ${AI_TEMPERATURE}
      RUN_MIGRATIONS: "1"
      RUN_SEEDERS: ${RUN_DEMO_SEED}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/up >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
    networks:
      - adscast_net

  horizon:
    build:
      context: .
      dockerfile: infra/docker/backend/Dockerfile
    container_name: adscast-horizon
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME}
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      APP_DEBUG: "false"
      APP_URL: ${APP_URL}
      APP_TIMEZONE: ${APP_TIMEZONE}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
      LOG_CHANNEL: stderr
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      CACHE_STORE: redis
      SESSION_DRIVER: database
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RUN_MIGRATIONS: "0"
      RUN_SEEDERS: "0"
    command: ["php", "artisan", "horizon"]
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - adscast_net

  scheduler:
    build:
      context: .
      dockerfile: infra/docker/backend/Dockerfile
    container_name: adscast-scheduler
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME}
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      APP_DEBUG: "false"
      APP_URL: ${APP_URL}
      APP_TIMEZONE: ${APP_TIMEZONE}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
      LOG_CHANNEL: stderr
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      CACHE_STORE: redis
      SESSION_DRIVER: database
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RUN_MIGRATIONS: "0"
      RUN_SEEDERS: "0"
    command: ["php", "artisan", "schedule:work"]
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - adscast_net

  frontend:
    build:
      context: .
      dockerfile: infra/docker/frontend/Dockerfile
      args:
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    container_name: adscast-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/login >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
    networks:
      - adscast_net

  proxy:
    image: nginx:1.27-alpine
    container_name: adscast-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - ./infra/nginx/adscast.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - adscast_net

volumes:
  adscast_postgres_data:
  adscast_redis_data:

networks:
  adscast_net:
    driver: bridge
